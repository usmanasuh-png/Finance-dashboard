<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Finance Dashboard</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">

    <h2 class="text-center mb-5">Personal Finance Dashboard</h2>

    <!-- Summary Card Layout -->
    <div class="row g-4">

        <div class="col-md-3">
            <div class="box">Card 1</div>
        </div>

        <div class="col-md-3">
            <div class="box">Card 2</div>
        </div>

        <div class="col-md-3">
            <div class="box">Card 3</div>
        </div>

        <div class="col-md-3">
            <div class="box">Card 4</div>
        </div>

    </div>

    <!-- Content Layout -->
    <div class="row mt-4 g-4">

        <div class="col-lg-8">
            <div class="large-box">
                Main Dashboard Area
            </div>
        </div>

        <div class="col-lg-4">
            <div class="large-box">
                Side Section
            </div>
        </div>

    </div>

    <!-- Bottom Section -->
    <div class="row mt-4">

        <div class="col-12">
            <div class="large-box">
                Bottom Section
            </div>
        </div>

    </div>

</div>

</body>
</html>
